project_id = "oms-alcore-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public", "oms", "ref", "legacy", "staging"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.oms-documents]
public = false
file_size_limit = "50MiB"
allowed_mime_types = [
  "application/pdf",
  "image/png",
  "image/jpeg",
  "text/csv",
  "application/json"
]
objects_path = "./storage/oms-documents"

[storage.buckets.oms-legacy-imports]
public = false
file_size_limit = "100MiB"
allowed_mime_types = [
  "text/csv",
  "application/json",
  "application/octet-stream"
]
objects_path = "./storage/oms-legacy-imports"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.oms-health]
enabled = true
verify_jwt = false

[functions.user-types]
enabled = true
verify_jwt = true

[analytics]
enabled = false
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
